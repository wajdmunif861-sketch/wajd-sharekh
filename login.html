<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة وجد</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background-color: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 100%; max-width: 380px; text-align: center; border: 1px solid #334155; }
        h2 { color: #f59e0b; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 13px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background-color: #0f172a; color: white; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 12px; background-color: #f59e0b; color: #0f172a; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>منصة وجد الرقمية 🏢</h2>
        <p>للمسوقين الجدد: اكتب اسمك وباسوردك المختار وسيتم تفعيل حسابك فوراً.</p>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="اسم المستخدم" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit">دخول الحساب 🚀</button>
        </form>
    </div>
</body>
</html>
